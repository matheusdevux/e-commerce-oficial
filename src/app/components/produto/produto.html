<div>
    <h2>Fluxo de dados com if</h2>
    @if(mostrarProduto) {
    <h3>Produto:{{produto}}</h3>
    }
    @if(mostrarPreco) {
    <p>Preço: R$ {{preco}}</p>
    }
</div>
<div>
    <h2>Fluxo de dados com for</h2>
    @for(item of produtos; track item) {
    <h3>Produto:{{item.nome}}</h3>
    <p>Valor: R$ {{item.preco}}</p>
    }
</div>
